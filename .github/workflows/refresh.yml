name: Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  refresh:
    runs-on: self-hosted
    steps:
      - name: Run dashboard update
        shell: powershell
        run: |
          $bat = 'C:\Users\bearley\OneDrive - Tifosi Optics\Whatagraph Replacement\run_dashboard_update.bat'
          $proc = Start-Process -FilePath 'cmd.exe' -ArgumentList "/c `"$bat`"" -Wait -PassThru -NoNewWindow
          exit $proc.ExitCode
